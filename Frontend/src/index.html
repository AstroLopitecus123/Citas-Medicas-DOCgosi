<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>RETO Salud</title>
  <meta name="description" content="R.E.T.O Salud: Plataforma integral de gestión de citas médicas, historial clínico y telemedicina.">
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="assets/images/LogoSOLO.png">

  <!-- PRECONNECT a CDNs críticos (sin crossorigin para stylesheets) -->
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="preconnect" href="https://unpkg.com">
  <link rel="preconnect" href="https://res.cloudinary.com" crossorigin>
  <link rel="preconnect" href="https://backend-citas-production-4c29.up.railway.app" crossorigin>

  <!-- PRELOAD del logo principal (imagen LCP) -->
  <link rel="preload" as="image" href="assets/images/LogoFull2.png">

  <!-- LEAFLET CSS: Después del JS para no bloquear render visual -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

  <!-- FONT-AWESOME: carga no bloqueante con fallback -->

    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    media="print" onload="this.media='all'">
  <noscript>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  </noscript>

  <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-eval' 'unsafe-inline' https://js.stripe.com https://m.stripe.network https://accounts.google.com https://unpkg.com; worker-src 'self' blob:; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://unpkg.com; img-src 'self' data: blob: https://*.tile.openstreetmap.org https://unpkg.com https://*.basemaps.cartocdn.com https://res.cloudinary.com https://ui-avatars.com;">

</head>
