<div class="avatar-cropper-wrapper">
  <div class="cropper-canvas-container">
    <canvas
      #canvas
      [width]="CANVAS_SIZE"
      [height]="CANVAS_SIZE"
      class="cropper-canvas"
      style="cursor: grab; touch-action: none;"
    ></canvas>
    <p class="drag-hint">
      <i class="fa-solid fa-hand-pointer"></i>
      Arrastra la imagen · Usa el slider para hacer zoom
    </p>
  </div>

  <div class="zoom-row">
    <i class="fa-solid fa-magnifying-glass-minus zoom-icon-sm"></i>
    <input
      type="range"
      min="0.5"
      max="3"
      step="0.05"
      [(ngModel)]="zoom"
      (ngModelChange)="onZoomChange()"
      class="zoom-slider"
    />
    <i class="fa-solid fa-magnifying-glass-plus zoom-icon-lg"></i>
  </div>
</div>
