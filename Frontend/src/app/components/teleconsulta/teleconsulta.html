<div class="teleconsulta-wrapper">
  
    <!-- HEADER -->
    <header class="teleconsulta-header">
      <div class="brand-title">
        <i class="fa-solid fa-stethoscope"></i> R.E.T.O Salud | Teleconsulta #{{ citaId }}
      </div>
      <div class="controls-header">
        <div class="badge-role" style="background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2);">{{ rol }}</div>
      </div>
    </header>
  
    <!-- ÁREA DE VIDEO PRINCIPAL -->
    <div class="video-grid">
      
      <!-- Modal Inicial (Antes de Unirse) -->
      <div class="join-modal" *ngIf="!unido">
        <h2 style="color: #1e293b; font-weight: 800; font-size: 1.5rem;">Sala de Espera Virtual</h2>
        <p style="color: #64748b; margin-bottom: 25px;">Verifique su conexión antes de ingresar a la consulta.</p>
        <button class="btn-confirm-glass" style="width: 100%; border-radius: 12px; font-size: 1.1rem; padding: 15px;" (click)="unirseASala()">
            <i class="fa-solid fa-video"></i> Ingresar a Consulta
        </button>
      </div>
  
      <!-- Contenedores Nativos de Agora -->
      <div class="video-container video-remote" id="remote-video" [hidden]="!unido">
        <!-- Renderizar Video del otro partiicpante aquí -->
        <div class="loader-video" style="height: 100%; justify-content: center; background: #0f172a;" *ngIf="!remoteUserJoined && unido">
            <i class="fa-solid fa-spinner fa-spin"></i>
            Esperando a la otra persona...
        </div>
      </div>
  
      <div class="video-container video-local" id="local-video" [hidden]="!unido">
        <!-- Renderizar Video Local aquí -->
      </div>
  
      <!-- SUBTÍTULOS INTELIGENTES (DEEPGRAM) -->
      <div class="smart-subtitles" *ngIf="unido && mostrarSubtitulos">
        <div class="subtitle-box">
            <span class="badge-speaker">{{ mensajeActualEmisor }}</span>
            <p>{{ mensajeActualTranscrito || '...' }}</p>
        </div>
      </div>
  
    </div>
  
    <!-- CONTROLES INFERIORES -->
    <footer class="teleconsulta-header" style="justify-content: center; gap: 20px;" *ngIf="unido">
        
        <button class="btn-control" (click)="toggleMic()" [class.danger]="!micOn" [title]="micOn ? 'Silenciar' : 'Activar Micrófono'">
            <i class="fa-solid" [class.fa-microphone]="micOn" [class.fa-microphone-slash]="!micOn"></i>
        </button>
  
        <button class="btn-control" (click)="toggleCam()" [class.danger]="!camOn" [title]="camOn ? 'Apagar Cámara' : 'Encender Cámara'">
            <i class="fa-solid" [class.fa-video]="camOn" [class.fa-video-slash]="!camOn"></i>
        </button>
  
        <button class="btn-control danger" style="background: #ef4444; color: white; width: 60px; height: 60px;" (click)="salirDeSala()" title="Finalizar Consulta">
            <i class="fa-solid fa-phone-slash"></i>
        </button>
  
        <!-- BOTÓN EXCLUSIVO DEL DOCTOR: Activar IA Deepgram -->
        <button *ngIf="rol === 'MEDICO'" class="btn-control" [class.active-sub]="deepgramActive" (click)="toggleDeepgram()" title="Transmitir Subtítulos en Vivo">
            <i class="fa-solid fa-closed-captioning"></i>
        </button>
        
        <!-- BOTÓN DEL PACIENTE: Solo para indicar visualmente -->
        <button *ngIf="rol === 'PACIENTE'" class="btn-control" [class.active-sub]="mostrarSubtitulos" (click)="mostrarSubtitulos = !mostrarSubtitulos" title="Ocultar/Mostrar Subtítulos">
            <i class="fa-solid fa-eye"></i>
        </button>
  
    </footer>
  
  </div>
