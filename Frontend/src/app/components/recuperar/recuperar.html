<div class="recuperar-container">
  <div class="card">
    <h2>Recuperar Contraseña</h2>

    <form (ngSubmit)="ctrl.recuperar()">
      <div class="form-group">
        <label for="correo">Correo electrónico:</label>
        <input type="email" id="correo" [(ngModel)]="ctrl.correo" name="correo" placeholder="ejemplo@correo.com" required>
      </div>

      <button type="submit" class="btn-enviar" [disabled]="ctrl.enviado">Enviar enlace</button>
    </form>

    <p *ngIf="ctrl.mensaje" class="msg-exito">{{ ctrl.mensaje }}</p>
    <p *ngIf="ctrl.error" class="msg-error">{{ ctrl.error }}</p>
  </div>
</div>
