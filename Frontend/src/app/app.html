<div class="page-loader" *ngIf="loading">
  <div class="loader-content">
    <img src="/assets/images/LogoSOLO.png" alt="Cargando..." class="loader-logo">
  </div>
</div>

<header class="header">
  <div class="header-container">
    <h1 class="titulo" routerLink="/">
      <img src="/assets/images/LogoSOLO.png" alt="RETO Logo" class="header-logo">
      <div class="logo-text-stack">
        <span class="reto-text">R.E.T.O.</span>
        <span class="salud-text">Salud</span>
      </div>
    </h1>

    <!-- Botón Hamburguesa (Móviles) -->
    <button class="menu-toggle" (click)="toggleMenu()">
      <i class="fa-solid" [ngClass]="isMenuOpen ? 'fa-xmark' : 'fa-bars'"></i>
    </button>

    <nav class="nav-links" [ngClass]="{'open': isMenuOpen}" (click)="isMenuOpen = false">

      <!-- SOLO ADMIN -->
      <a *ngIf="isLoggedIn && usuario?.rol === 'ADMIN'" routerLink="/especialidades">
        <i class="fa-solid fa-notes-medical"></i> Especialidades
      </a>
      <a *ngIf="isLoggedIn && usuario?.rol === 'ADMIN'" routerLink="/medicos">
        <i class="fa-solid fa-user-doctor"></i> Médicos
      </a>
      <a *ngIf="isLoggedIn && usuario?.rol === 'ADMIN'" routerLink="/usuarios">
        <i class="fa-solid fa-users"></i> Usuarios
      </a>

      <!-- SOLO USUARIOS NO LOGUEADOS -->
      <a *ngIf="!isLoggedIn" routerLink="/registrar">
        <i class="fa-solid fa-user-plus"></i> Registrar
      </a>
      <a *ngIf="!isLoggedIn" routerLink="/login">
        <i class="fa-solid fa-right-to-bracket"></i> Inicio de Sesión
      </a>

      <!-- CERRAR SESIÓN PARA CUALQUIER USUARIO LOGUEADO -->
      <a *ngIf="isLoggedIn" (click)="abrirModalCerrarSesion(); $event.stopPropagation()" class="cerrar-sesion">
        <i class="fa-solid fa-power-off"></i> Cerrar sesión
      </a>
    </nav>
  </div>
</header>

<!-- Contenedor para centrar el contenido del router -->
<div class="contenido-centrado">
  <!-- 🔥 Detecta login sin recargar la página -->
  <router-outlet (activate)="onRouteChange($event)"></router-outlet>
</div>

<!-- Modal de confirmación -->
<div class="modal-overlay" *ngIf="mostrarModal">
  <div class="modal">
    <h3><i class="fa-solid fa-circle-exclamation" style="color: #c0392b; margin-right: 8px;"></i>¿Seguro que desea cerrar sesión?</h3>
    <div class="modal-buttons">
      <button (click)="cerrarSesion()">
        <i class="fa-solid fa-check"></i> Sí, cerrar sesión
      </button>
      <button (click)="cancelarCerrarSesion()">
        <i class="fa-solid fa-xmark"></i> Cancelar
      </button>
    </div>
  </div>
</div>

<!-- Asistente Virtual Inteligente (Gemini) -->
<app-chatbot></app-chatbot>
