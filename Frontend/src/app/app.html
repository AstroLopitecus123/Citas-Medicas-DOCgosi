<div class="page-loader" *ngIf="loading">
  <div class="loader-content">
    <img src="/assets/images/LogoSOLO.png" alt="Cargando..." class="loader-logo">
  </div>
</div>

<header class="header" *ngIf="!isAdminRoute">
  <div class="header-container">
    <h1 class="titulo" routerLink="/">
      <img src="/assets/images/LogoSOLO.png" alt="RETO Logo" class="header-logo">
      <div class="logo-text-stack">
        <span class="reto-text">R.E.T.O.</span>
        <span class="salud-text">Salud</span>
      </div>
    </h1>

    <!-- Botón Hamburguesa (Móviles) -->
    <button class="menu-toggle" (click)="toggleMenu()">
      <i class="fa-solid" [ngClass]="isMenuOpen ? 'fa-xmark' : 'fa-bars'"></i>
    </button>

    <nav class="nav-links" [ngClass]="{'open': isMenuOpen}" (click)="isMenuOpen = false">

      <a *ngIf="isLoggedIn && usuario?.rol === 'ADMIN'" routerLink="/admin">
        <i class="fa-solid fa-gauge-high"></i> Dashboard
      </a>

      <!-- SOLO USUARIOS NO LOGUEADOS -->
      <a *ngIf="!isLoggedIn" routerLink="/registrar">
        <i class="fa-solid fa-user-plus"></i> Registrar
      </a>
      <a *ngIf="!isLoggedIn" routerLink="/login">
        <i class="fa-solid fa-right-to-bracket"></i> Inicio de Sesión
      </a>

      <!-- CERRAR SESIÓN PARA CUALQUIER USUARIO LOGUEADO -->
      <a *ngIf="isLoggedIn" (click)="abrirModalCerrarSesion(); $event.stopPropagation()" class="cerrar-sesion">
        <i class="fa-solid fa-power-off"></i> Cerrar sesión
      </a>
    </nav>
  </div>
</header>

<!-- ━━━ SIDEBAR PERSISTENTE (SOLO ADMIN) ━━━ -->
<aside class="dashboard-sidebar" *ngIf="isAdminRoute">
  <div class="sidebar-brand">
    <img src="/assets/images/LogoSOLO.png" alt="Logo" class="sidebar-logo" />
    <div class="brand-text">
      <span class="brand-name">R.E.T.O</span>
      <span class="brand-sub">Panel Admin</span>
    </div>
  </div>

  <nav class="sidebar-nav">
    <a class="nav-item" routerLink="/admin" routerLinkActive="active">
      <i class="fa-solid fa-house-chimney-medical"></i>
      <span>Dashboard</span>
    </a>
    <a class="nav-item" routerLink="/especialidades" routerLinkActive="active">
      <i class="fa-solid fa-stethoscope"></i>
      <span>Especialidades</span>
    </a>
    <a class="nav-item" routerLink="/medicos" routerLinkActive="active">
      <i class="fa-solid fa-user-doctor"></i>
      <span>Médicos</span>
    </a>
    <a class="nav-item" routerLink="/usuarios" routerLinkActive="active">
      <i class="fa-solid fa-users"></i>
      <span>Usuarios</span>
    </a>
    <a class="nav-item" routerLink="/mis-citas" routerLinkActive="active">
      <i class="fa-solid fa-calendar-days"></i>
      <span>Citas</span>
    </a>
    <a class="nav-item" routerLink="/" routerLinkActive="active">
      <i class="fa-solid fa-home"></i>
      <span>Ver Web</span>
    </a>
  </nav>

  <div class="sidebar-footer">
    <div class="admin-profile">
      <div class="admin-avatar">
        <i class="fa-solid fa-user-shield"></i>
      </div>
      <div class="admin-info">
        <span class="admin-name">{{ usuario?.nombre || 'Admin' }}</span>
        <span class="admin-role">Administrador</span>
      </div>
    </div>
    <button class="btn-logout-sidebar" (click)="abrirModalCerrarSesion()">
      <i class="fa-solid fa-power-off"></i> Salir
    </button>
  </div>
</aside>

<!-- Contenedor para centrar el contenido del router -->
<div class="contenido-centrado" [class.no-padding]="isAdminRoute">
  <!-- 🔥 Detecta login sin recargar la página -->
  <router-outlet (activate)="onRouteChange($event)"></router-outlet>
</div>

<!-- Modal de confirmación -->
<div class="modal-overlay" *ngIf="mostrarModal">
  <div class="modal">
    <h3><i class="fa-solid fa-circle-exclamation" style="color: #c0392b; margin-right: 8px;"></i>¿Seguro que desea cerrar sesión?</h3>
    <div class="modal-buttons">
      <button (click)="cerrarSesion()">
        <i class="fa-solid fa-check"></i> Sí, cerrar sesión
      </button>
      <button (click)="cancelarCerrarSesion()">
        <i class="fa-solid fa-xmark"></i> Cancelar
      </button>
    </div>
  </div>
</div>

<!-- Asistente Virtual Inteligente (Gemini) -->
<app-chatbot></app-chatbot>
