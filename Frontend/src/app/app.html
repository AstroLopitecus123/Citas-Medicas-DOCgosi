<header class="header">
  <div class="header-container">
    <h1 class="titulo">Clínica Real Madrid</h1>

    <nav class="nav-links">

      <!-- SOLO ADMIN -->
      <a *ngIf="isLoggedIn && usuario?.rol === 'ADMIN'" routerLink="/especialidades">Especialidades</a>
      <a *ngIf="isLoggedIn && usuario?.rol === 'ADMIN'" routerLink="/medicos">Medicos</a>
      <a *ngIf="isLoggedIn && usuario?.rol === 'ADMIN'" routerLink="/usuarios">Usuarios</a>

      <!-- SOLO USUARIOS NO LOGUEADOS -->
      <a *ngIf="!isLoggedIn" routerLink="/registrar">Registrar</a>
      <a *ngIf="!isLoggedIn" routerLink="/">Inicio de Sesión</a>

      <!-- CERRAR SESIÓN PARA CUALQUIER USUARIO LOGUEADO -->
      <a *ngIf="isLoggedIn" (click)="abrirModalCerrarSesion()" class="cerrar-sesion">Cerrar sesión</a>
    </nav>
  </div>

  <div class="arrow-indicator">MÁS OPCIONES DE NAVEGACIÓN</div>
</header>

<hr />

<!-- Contenedor para centrar el contenido del router -->
<div class="contenido-centrado">
  <!-- 🔥 Detecta login sin recargar la página -->
  <router-outlet (activate)="onRouteChange($event)"></router-outlet>
</div>

<!-- Modal de confirmación -->
<div class="modal-overlay" *ngIf="mostrarModal">
  <div class="modal">
    <h3>¿Seguro que desea cerrar sesión?</h3>
    <div class="modal-buttons">
      <button (click)="cerrarSesion()">Sí, cerrar sesión</button>
      <button (click)="cancelarCerrarSesion()">Cancelar</button>
    </div>
  </div>
</div>
